name: Release

on:
  push:
    tags:
      - 'v*.*.*'
      - '*.*.*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish Release Artifact
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate semver tag
        id: semver
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if [[ ! "${TAG_NAME}" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Tag '${TAG_NAME}' is not valid semver."
            exit 1
          fi

          echo "version=${TAG_NAME#v}" >> "${GITHUB_OUTPUT}"

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run tests
        run: ./gradlew --no-daemon test

      - name: Build plugin zip
        run: ./gradlew --no-daemon -Pversion=${{ steps.semver.outputs.version }} buildPlugin

      - name: Collect release artifacts
        id: artifacts
        env:
          RELEASE_VERSION: ${{ steps.semver.outputs.version }}
        run: |
          ZIP_PATH="$(find build/distributions -maxdepth 1 -type f -name "*${RELEASE_VERSION}*.zip" | head -n 1)"
          if [[ -z "${ZIP_PATH}" ]]; then
            echo "No plugin zip found in build/distributions"
            exit 1
          fi

          SHA_PATH="${ZIP_PATH}.sha256"
          sha256sum "${ZIP_PATH}" > "${SHA_PATH}"

          echo "zip_path=${ZIP_PATH}" >> "${GITHUB_OUTPUT}"
          echo "sha_path=${SHA_PATH}" >> "${GITHUB_OUTPUT}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfvc-plugin-${{ steps.semver.outputs.version }}
          path: |
            ${{ steps.artifacts.outputs.zip_path }}
            ${{ steps.artifacts.outputs.sha_path }}

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            ${{ steps.artifacts.outputs.zip_path }}
            ${{ steps.artifacts.outputs.sha_path }}
